<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phòng Làm Bài Thi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #d35400; margin-top: 0; text-transform: uppercase; }
        .timer-box { text-align: center; font-size: 24px; color: #c0392b; font-weight: bold; margin-bottom: 20px; background: #fdf2e9; padding: 15px; border-radius: 8px; border: 1px dashed #e59866; }
        .list-box { background: #fff; border: 1px solid #e0e0e0; border-left: 5px solid #d35400; padding: 20px; margin-bottom: 15px; border-radius: 6px; }
        .radio-group { margin: 10px 0; padding: 8px 12px; background: #fcfcfc; border-radius: 6px; border: 1px solid #f0f0f0; }
        .radio-group input { margin-right: 10px; transform: scale(1.1); }
        textarea.ans-input { width: 100%; height: 120px; border: 1px solid #ccc; border-radius: 6px; padding: 12px; box-sizing: border-box; }
        .btn-success { background: linear-gradient(135deg, #d35400, #e67e22); color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; box-shadow: 0 4px 10px rgba(211,84,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔥 PHÒNG THI ONLINE XIN CHÀO 🔥</h2>
        <div class="timer-box">⏳ Thời gian còn lại: <span id="countdown">15:00</span></div>
        <div id="examArea">Đang nạp đề thi bảo mật từ JSONbin...</div>
        <br>
        <button class="btn-success" onclick="submitExam()">🎯 NỘP BÀI THI</button>
    </div>

    <script>
        const MASTER_KEY = "$2a$10$7v4PhJO8eUu5nA2C0NUhf.kpljf8iTlptXuIQ.4j/6dpK8YoE88EO"; 
        const BIN_ID = "6a3f8b72da38895dfe068e1f";

        if (localStorage.getItem('role') !== 'student') window.location.href = 'index.html';

        let currentData = { questions: [], submissions: [] };
        let timer;

        async function startExam() {
            let timeLeft = 15 * 60;
            timer = setInterval(() => {
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('countdown').innerText = `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
                if(timeLeft <= 0) { clearInterval(timer); submitExam(); }
                timeLeft--;
            }, 1000);

            const area = document.getElementById('examArea');
            try {
                let resQ = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                let dataJson = await resQ.json();
                
                if (dataJson.record && typeof dataJson.record === 'object' && !Array.isArray(dataJson.record)) {
                    currentData = {
                        questions: dataJson.record.questions || [],
                        submissions: dataJson.record.submissions || []
                    };
                } else if (Array.isArray(dataJson.record)) {
                    currentData = { questions: dataJson.record, submissions: [] };
                }

                if(!currentData.questions || currentData.questions.length === 0) {
                    area.innerHTML = "<p style='text-align:center;'>Hiện chưa có đề thi nào được tạo!</p>";
                    return;
                }

                area.innerHTML = currentData.questions.map((q, i) => {
                    if(q.type === 'tuluan') {
                        return `
                            <div class="list-box quiz" data-id="${q.id}" data-type="tuluan">
                                <p><b>Câu ${i+1} (Tự luận):</b> ${q.content}</p>
                                <textarea class="ans-input" placeholder="Gõ câu trả lời..."></textarea>
                            </div>
                        `;
                    } else {
                        return `
                            <div class="list-box quiz" data-id="${q.id}" data-type="tracnghiem">
                                <p><b>Câu ${i+1} (Trắc nghiệm):</b> ${q.content}</p>
                                <div class="radio-group"><input type="radio" name="q_${q.id}" value="A"> A. ${q.answers[0]}</div>
                                <div class="radio-group"><input type="radio" name="q_${q.id}" value="B"> B. ${q.answers[1]}</div>
                                <div class="radio-group"><input type="radio" name="q_${q.id}" value="C"> C. ${q.answers[2]}</div>
                                <div class="radio-group"><input type="radio" name="q_${q.id}" value="D"> D. ${q.answers[3]}</div>
                            </div>
                        `;
                    }
                }).join('');
            } catch(e) { area.innerHTML = "<p style='color:red;'>Lỗi không thể tải đề thi từ JSONbin!</p>"; }
        }

        async function submitExam() {
            clearInterval(timer);
            const quizBlocks = document.querySelectorAll('.quiz');
            let studentAnswers = [];

            quizBlocks.forEach(block => {
                const type = block.getAttribute('data-type');
                let answerValue = "";

                if(type === 'tuluan') {
                    answerValue = block.querySelector('.ans-input').value;
                } else {
                    const checked = block.querySelector('input:checked');
                    if(checked) answerValue = checked.value;
                }

                studentAnswers.push({
                    answer: answerValue || "Bỏ trống / Không làm"
                });
            });

            let newSubmission = {
                studentName: localStorage.getItem('fullname') || "Học sinh ẩn danh",
                submitAt: new Date().toLocaleString(),
                answers: studentAnswers
            };

            if(!currentData.submissions) currentData.submissions = [];
            currentData.submissions.push(newSubmission);

            try {
                // Đẩy trực tiếp bộ dữ liệu bao gồm cả bài nộp mới lên mây JSONbin
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(currentData)
                });
                
                if(res.ok) {
                    alert('Nộp bài thành công lên Server mạng!');
                    window.location.href = 'result.html';
                } else {
                    alert('Lỗi gửi bài lên Server, vui lòng thử lại!');
                }
            } catch(e) {
                alert('Lỗi kết nối mạng, không thể nộp bài!');
            }
        }

        startExam();
    </script>
</body>
</html>
