<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Cyber Exam - Phòng Thi Đấu Trực Tuyến</title>
    <style>
        :root { 
            --bg-dark: #070a13;
            --card-dark: #111726;
            --neon-orange: #ff6b00;
            --neon-yellow: #fff01f;
            --neon-red: #ff3131;
            --text-light: #e2e8f0;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            margin: 0; 
            padding: 10px; 
            box-sizing: border-box;
        }
        
        /* Dải Matrix LED RGB Chạy Viền Trên Điện thoại & Máy tính */
        .rgb-line {
            height: 6px;
            width: 100%;
            position: fixed;
            top: 0; left: 0; z-index: 9999;
            background: linear-gradient(90deg, #ff0055, #00ff66, #00ffff, #ffcc00, #ff0055);
            background-size: 300%;
            animation: line-anim 6s linear infinite;
        }
        @keyframes line-anim {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .container { 
            max-width: 800px; 
            margin: 25px auto 10px auto; 
            background: var(--card-dark); 
            padding: 20px 15px; 
            border-radius: 14px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 107, 0, 0.15); 
        }
        @media (min-width: 576px) { .container { padding: 35px; } }

        h2 { 
            text-align: center; 
            color: #fff; 
            margin-top: 0; 
            font-size: 18px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(255, 107, 0, 0.4);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 15px;
        }
        @media (min-width: 576px) { h2 { font-size: 22px; } }
        
        /* Đồng hồ LED đỏ rực */
        .timer-box { 
            text-align: center; 
            font-size: 18px; 
            color: var(--neon-red); 
            font-weight: 800; 
            margin-bottom: 20px; 
            background: rgba(255, 49, 49, 0.08); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid rgba(255, 49, 49, 0.2); 
            text-shadow: 0 0 10px rgba(255, 49, 49, 0.4);
        }
        @media (min-width: 576px) { .timer-box { font-size: 22px; } }
        
        .cheat-warning-box { 
            text-align: center; 
            background: #2e1116; 
            color: #ff4d4d; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--neon-red); 
            margin-bottom: 20px; 
            font-weight: bold; 
            font-size: 13px;
            animation: flash 0.5s infinite alternate; 
            display: none; 
        }
        @keyframes flash { 0% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Block câu hỏi */
        .list-box { 
            background: #171f33; 
            border: 1px solid rgba(255,255,255,0.04); 
            border-left: 5px solid var(--neon-orange); 
            padding: 16px; 
            margin-bottom: 18px; 
            border-radius: 8px; 
        }
        .list-box p { margin-top: 0; font-size: 15px; font-weight: 600; color: #fff; line-height: 1.5; }
        
        /* Tối ưu hóa phím chọn Trắc nghiệm siêu to khổng lồ cho màn hình cảm ứng điện thoại */
        .radio-group { 
            margin: 10px 0; 
            padding: 14px 16px; 
            background: #1f2a45; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            user-select: none;
            transition: background 0.2s;
        }
        .radio-group:pointerdown, .radio-group:active { background: #2a3b61; }
        .radio-group input { 
            margin-right: 14px; 
            transform: scale(1.3); 
            cursor: pointer; 
            accent-color: var(--neon-orange);
        }
        
        textarea.ans-input { 
            width: 100%; 
            height: 110px; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; 
            padding: 12px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #1f2a45; 
            color: #fff;
        }
        textarea.ans-input:focus { outline: none; border-color: var(--neon-orange); }
        
        .btn-success { 
            background: linear-gradient(135deg, var(--neon-orange), #b84d00); 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 15px; 
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.3);
            text-transform: uppercase;
        }
        .btn-success:hover { box-shadow: 0 0 25px var(--neon-orange); }
    </style>
</head>
<body>
    <div class="rgb-line"></div>
    <div class="container">
        <h2>🔥 CYBER ARENA COMPETE ROOM 🔥</h2>
        <div class="timer-box">⏳ CLOCK COUNTDOWN: <span id="countdown">15:00</span></div>
        
        <div id="cheatWarning" class="cheat-warning-box">🛑 PHÁT HIỆN RỜI PHÒNG: <span id="cheatCount">0</span>/3 LẦN VI PHẠM! HỆ THỐNG SẼ TỰ ĐỘNG KHÓA BÀI NẾU QUÁ GIỚI HẠN.</div>

        <div id="examArea" style="text-align:center; color:#94a3b8; padding:20px;">Đang thiết lập cổng kết nối bảo mật JSONbin...</div>
        <br>
        <button class="btn-success" onclick="submitExam(false)">🎯 KHÓA MODULE & NỘP BÀI THI</button>
    </div>

    <script>
        const MASTER_KEY = "$2a$10$7v4PhJO8eUu5nA2C0NUhf.kpljf8iTlptXuIQ.4j/6dpK8YoE88EO"; 
        const BIN_ID = "6a3f9132da38895dfe06a006"; 

        if (!localStorage.getItem('role')) { localStorage.setItem('role', 'student'); }

        let currentData = { questions: [], submissions: [] };
        let timer;
        let cheatAttempts = 0; 
        let isSubmitted = false; 

        function handleCheatDetect() {
            if (isSubmitted) return; 
            cheatAttempts++;
            document.getElementById('cheatWarning').style.display = "block";
            document.getElementById('cheatCount').innerText = cheatAttempts;

            if (cheatAttempts >= 3) {
                alert('🔴 PHÒNG THI BỊ KHÓA: Hủy quyền thi đấu do gian lận thoát tab quá 3 lần!');
                submitExam(true); 
            } else {
                alert(`⚠️ CẢNH BÁO AN NINH TRƯỜNG THI!\nBạn vừa rời tab bài làm (Lần vi phạm: ${cheatAttempts}/3).`);
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') handleCheatDetect();
        });

        async function startExam() {
            let timeLeft = 15 * 60;
            timer = setInterval(() => {
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('countdown').innerText = `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
                if(timeLeft <= 0) { clearInterval(timer); submitExam(false); }
                timeLeft--;
            }, 1000);

            const area = document.getElementById('examArea');
            try {
                let resQ = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                let dataJson = await resQ.json();
                
                if (dataJson.record) {
                    currentData.questions = dataJson.record.questions || [];
                    currentData.submissions = dataJson.record.submissions || [];
                }

                if(!currentData.questions || currentData.questions.length === 0) {
                    area.innerHTML = "<p style='text-align:center; color:#94a3b8; font-style:italic;'>Trận đấu chưa có đề bài!</p>";
                    return;
                }

                area.innerHTML = currentData.questions.map((q, i) => {
                    if(q.type === 'tuluan') {
                        return `
                            <div class="list-box quiz" data-id="${q.id}" data-type="tuluan">
                                <p>Câu ${i+1} (Tự luận): ${q.content}</p>
                                <textarea class="ans-input" placeholder="Nhập chuỗi đáp án tự luận vào đây..."></textarea>
                            </div>
                        `;
                    } else {
                        return `
                            <div class="list-box quiz" data-id="${q.id}" data-type="tracnghiem">
                                <p>Câu ${i+1} (Trắc nghiệm): ${q.content}</p>
                                <div class="radio-group" onclick="this.querySelector('input').click()"><input type="radio" name="q_${q.id}" value="A"> A. ${q.answers[0]}</div>
                                <div class="radio-group" onclick="this.querySelector('input').click()"><input type="radio" name="q_${q.id}" value="B"> B. ${q.answers[1]}</div>
                                <div class="radio-group" onclick="this.querySelector('input').click()"><input type="radio" name="q_${q.id}" value="C"> C. ${q.answers[2]}</div>
                                <div class="radio-group" onclick="this.querySelector('input').click()"><input type="radio" name="q_${q.id}" value="D"> D. ${q.answers[3]}</div>
                            </div>
                        `;
                    }
                }).join('');
            } catch(e) { area.innerHTML = "<p style='color:var(--neon-red); text-align:center;'>❌ Lỗi liên kết JSONbin Server!</p>"; }
        }

        async function submitExam(isForced = false) {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timer);

            const quizBlocks = document.querySelectorAll('.quiz');
            let studentAnswers = [];

            quizBlocks.forEach(block => {
                const type = block.getAttribute('data-type');
                let answerValue = "";
                if(type === 'tuluan') {
                    answerValue = block.querySelector('.ans-input').value;
                } else {
                    const checked = block.querySelector('input:checked');
                    if(checked) answerValue = checked.value;
                }
                studentAnswers.push({ answer: answerValue || (isForced ? "Bị ép nộp (Gian lận)" : "Bỏ trống") });
            });

            let newSubmission = {
                studentName: localStorage.getItem('fullname') || "Gamer Ẩn Danh",
                submitAt: new Date().toLocaleString(),
                answers: studentAnswers,
                status: isForced ? `Hủy bài (Rời tab ${cheatAttempts} lần)` : "Nộp bài hợp lệ"
            };

            if(!currentData.submissions) currentData.submissions = [];
            currentData.submissions.push(newSubmission);

            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify(currentData)
                });
                if(res.ok) {
                    alert(isForced ? 'Hệ thống đã khóa bài do vi phạm!' : 'Đã truyền dữ liệu bài làm lên JSONbin thành công!');
                    window.location.href = 'result.html';
                } else { alert('Lỗi tải dữ liệu!'); }
            } catch(e) { alert('Mất kết nối mạng!'); }
        }

        startExam();
    </script>
</body>
</html>
