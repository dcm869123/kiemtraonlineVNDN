<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Cyber Gaming Edition</title>
    <style>
        :root { 
            --bg-dark: #0b0f19;
            --card-dark: #151d30;
            --text-light: #f8fafc;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-yellow: #fff01f;
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }
        
        /* Hiệu ứng thanh LED RGB 7 màu chạy vô tận */
        .rgb-bar {
            height: 6px;
            width: 100%;
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: rgb-animation 8s linear infinite;
        }
        @keyframes rgb-animation {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        /* Navbar Gaming */
        .navbar { 
            background: rgba(21, 29, 48, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 20px; 
            display: flex; 
            flex-direction: column;
            gap: 10px;
            align-items: center; 
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }
        @media (min-width: 768px) {
            .navbar { flex-direction: row; justify-content: space-between; padding: 15px 30px; }
        }
        .navbar h1 { 
            margin: 0; 
            font-size: 18px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            text-align: center;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .btn-logout { 
            background: transparent; 
            color: #fff; 
            border: 1px solid var(--neon-red); 
            padding: 6px 14px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 0 8px rgba(255, 49, 49, 0.2);
            transition: all 0.2s; 
        }
        .btn-logout:hover { background: var(--neon-red); color: #000; box-shadow: 0 0 15px var(--neon-red); }

        /* Main Layout linh hoạt cho Mobile */
        .main-layout { 
            max-width: 1200px; 
            margin: 20px auto; 
            padding: 0 15px; 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
        }
        @media (min-width: 992px) { .main-layout { grid-template-columns: 1fr 1fr; } }

        /* Gaming Card */
        .card { 
            background: var(--card-dark); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            position: relative;
        }
        .card-full { grid-column: 1 / -1; }
        .card h3 { 
            margin-top: 0; 
            color: var(--neon-pink); 
            font-size: 16px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 0, 127, 0.2); 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.3);
        }
        
        label { font-weight: 600; display: block; margin: 15px 0 6px; color: #94a3b8; font-size: 13px; text-transform: uppercase; }
        input[type="text"], select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #1e293b; 
            color: #fff;
            transition: all 0.2s; 
        }
        input[type="text"]:focus, select:focus, textarea:focus { 
            border-color: var(--neon-blue); 
            outline: none; 
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }
        textarea { height: 90px; resize: vertical; }

        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 480px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
        
        /* Gaming Buttons */
        button { font-weight: 700; cursor: pointer; border: none; transition: all 0.2s ease; text-transform: uppercase; }
        button:active { transform: scale(0.96); }
        .btn-add { 
            background: var(--neon-blue); color: #000; width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 15px; 
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
        }
        .btn-add:hover { box-shadow: 0 0 20px var(--neon-blue); }
        .btn-sync { 
            background: linear-gradient(135deg, var(--neon-pink), #b0005d); color: white; width: 100%; font-size: 15px; padding: 14px; border-radius: 8px; 
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }
        .btn-sync:hover { box-shadow: 0 0 25px var(--neon-pink); }
        .btn-refresh { 
            background: #1e293b; color: var(--neon-green); padding: 8px 14px; border-radius: 6px; font-size: 12px; border: 1px solid var(--neon-green); 
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
        }
        .btn-refresh:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }
        .btn-delete { background: rgba(255,49,49,0.1); color: var(--neon-red); padding: 6px 12px; font-size: 12px; border-radius: 6px; float: right; border: 1px solid var(--neon-red); }
        .btn-delete:hover { background: var(--neon-red); color: #000; }

        /* Lists */
        .list-container { max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .quiz-item { 
            background: #1e293b; border-left: 4px solid var(--neon-blue); padding: 14px; margin-bottom: 12px; border-radius: 0 8px 8px 0; 
            border-top: 1px solid rgba(255,255,255,0.02); border-right: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .sub-item { border-left-color: var(--neon-green); background: #162e24; }
        .sub-item.cheat-detected { border-left-color: var(--neon-red); background: #2e1616; }
        
        .badge { display: inline-block; padding: 3px 6px; font-size: 10px; font-weight: bold; border-radius: 4px; margin-left: 5px; }
        .badge-success { background: rgba(57, 255, 20, 0.2); color: var(--neon-green); }
        .badge-danger { background: rgba(255, 49, 49, 0.2); color: var(--neon-red); }
        
        small { color: #94a3b8; font-size: 12px; display: block; margin-top: 6px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="rgb-bar"></div>
    <div class="navbar">
        <h1>🎮 CENTRAL CONTROL COMMAND (K12-JSONBIN)</h1>
        <div class="user-info">
            <span style="font-size:14px;">Operator: <b id="adminName" style="color: var(--neon-green)">Admin</b></span>
            <button class="btn-logout" onclick="logout()">Xóa Cache</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- TẠO ĐỀ -->
        <div class="card">
            <h3>⚡ KHỞI TẠO MODULE CÂU HỎI</h3>
            <label>Phân loại Matrix:</label>
            <select id="quizType" onchange="toggleAnswersForm()">
                <option value="tuluan">Tự Luận (Essay Mode)</option>
                <option value="tracnghiem">Trắc Nghiệm (4-Choice Target)</option>
            </select>
            
            <label>Nội dung câu hỏi / Core Content:</label>
            <textarea id="quizContent" placeholder="Nhập mã nguồn hoặc câu hỏi thi tại đây..."></textarea>
            
            <div id="tracNghiemForm" style="display: none;">
                <label>Các Node phương án cấu trúc:</label>
                <div class="grid-2">
                    <input type="text" id="ansA" placeholder="Data Node A">
                    <input type="text" id="ansB" placeholder="Data Node B">
                    <input type="text" id="ansC" placeholder="Data Node C">
                    <input type="text" id="ansD" placeholder="Data Node D">
                </div>
                <label>Key đáp án chính xác:</label>
                <select id="correctAnswer">
                    <option value="A">Node A</option>
                    <option value="B">Node B</option>
                    <option value="C">Node C</option>
                    <option value="D">Node D</option>
                </select>
            </div>
            <button class="btn-add" onclick="saveQuestion()">+ THÊM VÀO BUFFER TẠM THỜI</button>
        </div>

        <!-- LIST ĐỀ -->
        <div class="card">
            <h3>🛸 BUFFER ĐỀ THI CỤC BỘ</h3>
            <div class="list-container" id="listQuestions">Đang quét phân vùng dữ liệu...</div>
            <div style="margin-top: 20px;">
                <button class="btn-sync" onclick="syncToJSONbin()">⚡ ĐỒNG BỘ LÊN MẠNG CLOUD SERVER</button>
            </div>
        </div>

        <!-- BÀI NỘP HỌC SINH -->
        <div class="card card-full">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; flex-wrap: wrap; gap:10px;">
                <h3 style="margin:0; border:none; padding:0; color:var(--neon-green)">📥 NHẬT KÝ THÍ SINH NỘP BÀI (LOGS)</h3>
                <button class="btn-refresh" onclick="fetchCurrentData()">🔄 TẢI LẠI TRẠM DỮ LIỆU</button>
            </div>
            <div class="list-container" id="adminSubmissionArea" style="max-height: 450px;">Đang dò tìm kết nối mạng...</div>
        </div>
    </div>

    <script>
        const MASTER_KEY = "$2a$10$7v4PhJO8eUu5nA2C0NUhf.kpljf8iTlptXuIQ.4j/6dpK8YoE88EO"; 
        const BIN_ID = "6a3f9132da38895dfe06a006"; 

        if (localStorage.getItem('role') !== 'admin') {
            localStorage.setItem('role', 'admin');
        }
        document.getElementById('adminName').innerText = localStorage.getItem('fullname') || "Lâm Studio";

        let serverData = { questions: [], submissions: [] };

        async function fetchCurrentData() {
            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                let dataJson = await res.json();
                if (dataJson.record) {
                    serverData.questions = dataJson.record.questions || [];
                    serverData.submissions = dataJson.record.submissions || [];
                }
            } catch(e) {
                serverData.questions = JSON.parse(localStorage.getItem('db_questions')) || [];
            }
            renderLocalQuestions();
            renderSubmissions();
        }

        function toggleAnswersForm() {
            const type = document.getElementById('quizType').value;
            document.getElementById('tracNghiemForm').style.display = type === 'tracnghiem' ? 'block' : 'none';
        }

        function saveQuestion() {
            const type = document.getElementById('quizType').value;
            const content = document.getElementById('quizContent').value;
            if(!content) return alert('Nhập nội dung đề bài!');

            let data = { id: Date.now().toString(), type, content };
            if(type === 'tracnghiem') {
                data.answers = [
                    document.getElementById('ansA').value || "Mục A",
                    document.getElementById('ansB').value || "Mục B",
                    document.getElementById('ansC').value || "Mục C",
                    document.getElementById('ansD').value || "Mục D"
                ];
                data.correct = document.getElementById('correctAnswer').value;
            }

            serverData.questions.push(data);
            localStorage.setItem('db_questions', JSON.stringify(serverData.questions));
            renderLocalQuestions();
            document.getElementById('quizContent').value = "";
        }

        function renderLocalQuestions() {
            const container = document.getElementById('listQuestions');
            if(!serverData.questions || serverData.questions.length === 0) {
                container.innerHTML = "<p style='color:#64748b; font-style:italic; text-align:center;'>Buffer trống.</p>";
                return;
            }
            container.innerHTML = serverData.questions.map((q, i) => `
                <div class="quiz-item">
                    <button class="btn-delete" onclick="deleteQuestion(${i})">Xóa</button>
                    <b>Slot ${i+1} [${q.type === 'tuluan' ? 'TL' : 'TN'}]:</b> ${q.content}
                    ${q.type === 'tracnghiem' ? `<small>A: ${q.answers[0]} | B: ${q.answers[1]} <br>C: ${q.answers[2]} | D: ${q.answers[3]} <br><span style="color:var(--neon-green)">Target Key: ${q.correct}</span></small>` : ''}
                </div>
            `).join('');
        }

        function deleteQuestion(index) {
            serverData.questions.splice(index, 1);
            localStorage.setItem('db_questions', JSON.stringify(serverData.questions));
            renderLocalQuestions();
        }

        async function syncToJSONbin() {
            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                    body: JSON.stringify(serverData)
                });
                if(res.ok) alert('🚀 ĐỒNG BỘ CLOUD SỬA ĐỔI HOÀN TẤT!');
                else alert('Đồng bộ thất bại!');
            } catch(e) { alert('Lỗi hệ thống mạng!'); }
        }

        function renderSubmissions() {
            const container = document.getElementById('adminSubmissionArea');
            if(!serverData.submissions || serverData.submissions.length === 0) {
                container.innerHTML = "<p style='color:#64748b; text-align:center;'>Chưa nhận được Logs bài làm nào.</p>";
                return;
            }
            container.innerHTML = serverData.submissions.map(s => {
                const isCheat = s.status && s.status.includes('Hủy');
                return `
                    <div class="quiz-item sub-item ${isCheat ? 'cheat-detected' : ''}">
                        <b>User: <span style="color:var(--neon-blue)">${s.studentName}</span></b>
                        <span class="badge ${isCheat ? 'badge-danger' : 'badge-success'}">${s.status}</span>
                        <small>Time Log: ${s.submitAt}</small>
                        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.05);">
                            ${s.answers ? s.answers.map((ans, idx) => `
                                <div style="margin-bottom: 4px; font-size:13px;">
                                    <b>Slot ${idx+1}:</b> <span style="color:var(--neon-yellow)">${ans.answer}</span>
                                </div>
                            `).join('') : 'Trống'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        fetchCurrentData();
    </script>
</body>
</html>
