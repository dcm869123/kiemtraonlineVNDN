<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản Trị Đề Thi</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --success: #2ecc71; --warning: #f39c12; --danger: #e74c3c; --bg: #f5f7fa; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h2 { color: var(--primary); border-bottom: 3px solid var(--secondary); padding-bottom: 10px; margin-top: 0; }
        h3 { color: var(--secondary); margin-top: 25px; }
        label { font-weight: bold; display: block; margin: 10px 0 5px; color: #34495e; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
        textarea { height: 100px; resize: vertical; }
        button { font-weight: bold; cursor: pointer; padding: 12px 20px; border: none; border-radius: 8px; color: white; transition: all 0.3s ease; font-size: 14px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-success { background: var(--success); width: 100%; margin-top: 10px; }
        .btn-sync { background: linear-gradient(135deg, #e67e22, #f39c12); width: 100%; font-size: 16px; padding: 15px; margin-top: 15px; box-shadow: 0 4px 10px rgba(230,126,34,0.3); }
        .btn-secondary { background: #7f8c8d; float: right; }
        .clear { clear: both; }
        .list-box { background: #f8f9fa; border-left: 5px solid var(--secondary); padding: 15px; margin: 10px 0; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .sub-item { border-left-color: var(--success); background: #f0fdf4; }
        .btn-delete { background: var(--danger); padding: 5px 10px; font-size: 12px; float: right; border-radius: 4px; }
        small { color: #7f8c8d; font-size: 13px; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-secondary" onclick="logout()">Đăng xuất</button>
        <div class="clear"></div>
        <h2>QUẢN TRỊ VIÊN HỆ THỐNG</h2>
        <p>Xin chào: <b id="adminName" style="color: var(--secondary)">...</b></p>

        <h3>1. Thêm Câu Hỏi Mới Vào Đề Thi</h3>
        <label>Loại câu hỏi:</label>
        <select id="quizType" onchange="toggleAnswersForm()">
            <option value="tuluan">Tự Luận</option>
            <option value="tracnghiem">Trắc Nghiệm (4 đáp án)</option>
        </select>
        <label>Nội dung câu hỏi / Đề bài:</label>
        <textarea id="quizContent" placeholder="Nhập nội dung câu hỏi tại đây..."></textarea>
        
        <div id="tracNghiemForm" style="display: none;">
            <label>Các đáp án lựa chọn:</label>
            <input type="text" id="ansA" placeholder="Đáp án A">
            <input type="text" id="ansB" placeholder="Đáp án B">
            <input type="text" id="ansC" placeholder="Đáp án C">
            <input type="text" id="ansD" placeholder="Đáp án D">
            <label>Đáp án đúng:</label>
            <select id="correctAnswer">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
        </div>
        <button class="btn-success" onclick="saveQuestion()">+ THÊM VÀO DANH SÁCH TẠM THỜI</button>

        <h3>2. Cấu Trúc Đề Thi Hiện Tại (Chờ Đồng Bộ)</h3>
        <div id="listQuestions">Đang tải cấu trúc câu hỏi cục bộ...</div>
        <button class="btn-sync" onclick="syncToJSONbin()">⚡ ĐỒNG BỘ ĐỀ LÊN MẠNG (JSONBIN)</button>

        <h3>3. Bài Làm Của Học Sinh Nộp Về</h3>
        <div id="adminSubmissionArea">Đang tải danh sách bài nộp từ hệ thống mạng...</div>
    </div>

    <script>
        const MASTER_KEY = "$2a$10$7v4PhJO8eUu5nA2C0NUhf.kpljf8iTlptXuIQ.4j/6dpK8YoE88EO"; 
        const BIN_ID = "6a3f8b72da38895dfe068e1f";

        if (localStorage.getItem('role') !== 'admin') window.location.href = 'index.html';
        document.getElementById('adminName').innerText = localStorage.getItem('fullname');

        let localQuestions = [];

        // Hàm tự động kéo đề xịn trên JSONbin về để hiển thị khi Admin F5 trang
        async function fetchCurrentExam() {
            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                let dataJson = await res.json();
                // Nếu trên mạng có dữ liệu xịn, lấy luôn dữ liệu đó làm mặc định
                if(dataJson.record && Array.isArray(dataJson.record)) {
                    localQuestions = dataJson.record;
                    localStorage.setItem('db_questions', JSON.stringify(localQuestions));
                }
            } catch(e) {
                localQuestions = JSON.parse(localStorage.getItem('db_questions')) || [];
            }
            renderLocalQuestions();
        }

        function toggleAnswersForm() {
            const type = document.getElementById('quizType').value;
            document.getElementById('tracNghiemForm').style.display = type === 'tracnghiem' ? 'block' : 'none';
        }

        function saveQuestion() {
            const type = document.getElementById('quizType').value;
            const content = document.getElementById('quizContent').value;
            if(!content) return alert('Vui lòng điền đề bài!');

            let data = { id: Date.now().toString(), type, content };
            if(type === 'tracnghiem') {
                data.answers = [
                    document.getElementById('ansA').value || "Đáp án A",
                    document.getElementById('ansB').value || "Đáp án B",
                    document.getElementById('ansC').value || "Đáp án C",
                    document.getElementById('ansD').value || "Đáp án D"
                ];
                data.correct = document.getElementById('correctAnswer').value;
            }

            localQuestions.push(data);
            localStorage.setItem('db_questions', JSON.stringify(localQuestions));
            alert('Đã thêm vào danh sách tạm!');
            renderLocalQuestions();
            document.getElementById('quizContent').value = "";
        }

        function renderLocalQuestions() {
            if(localQuestions.length === 0) {
                document.getElementById('listQuestions').innerHTML = "<p style='color:#7f8c8d; font-style:italic;'>Chưa có câu hỏi nào. Hãy tạo câu hỏi ở mục 1.</p>";
                return;
            }
            document.getElementById('listQuestions').innerHTML = localQuestions.map((q, i) => `
                <div class="list-box">
                    <button class="btn-delete" onclick="deleteQuestion(${i})">Xóa</button>
                    <b>Câu ${i+1} [${q.type === 'tuluan' ? 'Tự luận' : 'Trắc nghiệm'}]:</b> ${q.content}
                    ${q.type === 'tracnghiem' ? `<small><b>A:</b> ${q.answers[0]} | <b>B:</b> ${q.answers[1]} | <b>C:</b> ${q.answers[2]} | <b>D:</b> ${q.answers[3]} <br> <b style="color:var(--success)">Đúng: ${q.correct}</b></small>` : ''}
                    <div style="clear:both;"></div>
                </div>
            `).join('');
        }

        function deleteQuestion(index) {
            localQuestions.splice(index, 1);
            localStorage.setItem('db_questions', JSON.stringify(localQuestions));
            renderLocalQuestions();
        }

        async function syncToJSONbin() {
            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(localQuestions)
                });
                if(res.ok) alert('Đã đồng bộ đề thi lên JSONbin thành công! Học sinh có thể làm bài ngay.');
                else alert('Đồng bộ thất bại, kiểm tra lại tài khoản JSONbin!');
            } catch(e) { alert('Lỗi kết nối mạng!'); }
        }

        // Đọc danh sách bài nộp của học sinh từ bộ nhớ tạm để hiển thị thời gian thực
        function loadSubmissions() {
            let submissions = JSON.parse(localStorage.getItem('global_submissions')) || [];
            if(submissions.length === 0) {
                document.getElementById('adminSubmissionArea').innerHTML = "<p style='color:#7f8c8d;'>Chưa có học sinh nào nộp bài.</p>";
                return;
            }
            document.getElementById('adminSubmissionArea').innerHTML = submissions.map(s => `
                <div class="list-box sub-item">
                    <b>Thí sinh: <span style="color:var(--primary)">${s.studentName || 'Ẩn danh'}</span></b> <br>
                    <small>Thời gian nộp bài: ${s.submitAt}</small>
                    <p style="margin: 5px 0; font-weight:bold;">Nội dung trả lời:</p>
                    ${s.answers ? s.answers.map((ans, idx) => `
                        <div style="margin-left: 15px; margin-bottom: 4px; font-size:14px;">
                            + Câu ${idx+1}: Chọn/Viết: <b style="color:var(--secondary)">${ans.answer}</b>
                        </div>
                    `).join('') : 'Không có dữ liệu'}
                </div>
            `).join('');
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        fetchCurrentExam();
        loadSubmissions();
    </script>
</body>
</html>
