<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học Sinh - Bảng Điều Khiển</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h2 { color: #008080; border-bottom: 2px solid #008080; padding-bottom: 10px; margin-top: 0; }
        .list-box { background: linear-gradient(to right, #f9f9f9, #f1f1f1); border-left: 6px solid #008080; padding: 20px; margin-top: 20px; border-radius: 8px; }
        .btn-success { background: linear-gradient(135deg, #00b4db, #0083b0); color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-shadow: 0 4px 10px rgba(0,131,176,0.2); transition: all 0.3s; }
        .btn-success:hover { transform: translateY(-2px); opacity: 0.95; }
        .btn-secondary { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 6px; float: right; cursor: pointer; }
        .clear { clear: both; }
        b { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-secondary" onclick="logout()">Đăng xuất</button>
        <div class="clear"></div>
        <h2>HỆ THỐNG LUYỆN THI TRỰC TUYẾN</h2>
        <p>Xin chào học sinh: <b id="studentName" style="color:#0083b0">...</b></p>
        
        <div class="list-box">
            <h4 style="margin-top:0; color:#0083b0; font-size:18px;">Kỳ Thi Đánh Giá Năng Lực Học Tập</h4>
            <p>⏱ Thời gian làm bài: <b>15 phút</b></p>
            <p>🟢 Trạng thái đề: <span style="color:#2ecc71; font-weight:bold;">ĐANG MỞ THI</span></p>
            <br>
            <button class="btn-success" id="btnVaoThi" onclick="window.location.href='exam.html'">👉 VÀO LÀM BÀI THI NGAY</button>
        </div>
    </div>

    <script>
        const API_URL = "https://k12-cua-lam.free.beeceptor.com"; // THAY LINK CỦA BẠN VÀO ĐÂY
        if (localStorage.getItem('role') !== 'student') window.location.href = 'index.html';
        document.getElementById('studentName').innerText = localStorage.getItem('fullname');
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
